openapi: "3.0.3"
info:
  title: PING Platform – Convex API
  version: "1.1.0"
  description: |
    Public API for the PING Platform, backed by [Convex](https://convex.dev).

    ## How to call Convex functions

    All **queries** and **mutations** are called as JSON-RPC style HTTP requests:

    | Function type | Method | Path |
    |---|---|---|
    | Query | `POST` | `{CONVEX_URL}/api/query` |
    | Mutation | `POST` | `{CONVEX_URL}/api/mutation` |

    ### Request body shape

    ```json
    {
      "path": "<module>:<function>",
      "args": { ... },
      "format": "json"
    }
    ```

    ### Authentication

    Pass a Bearer JWT token issued by WorkOS in the `Authorization` header:

    ```
    Authorization: Bearer <token>
    ```

servers:
  - url: "{convexUrl}"
    description: Convex deployment URL
    variables:
      convexUrl:
        default: https://your-deployment.convex.cloud
        description: Your Convex deployment URL (NEXT_PUBLIC_CONVEX_URL)

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT issued by WorkOS

  schemas:
    # ─── Base Convex request/response ───────────────────────────────────────────
    ConvexQueryRequest:
      type: object
      required: [path, args, format]
      properties:
        path:
          type: string
          description: "Function reference in the form `module:functionName`"
          example: "users:getMe"
        args:
          type: object
          description: Arguments to pass to the function
        format:
          type: string
          enum: [json]
          default: json

    ConvexMutationRequest:
      type: object
      required: [path, args, format]
      properties:
        path:
          type: string
          description: "Function reference in the form `module:functionName`"
          example: "channels:create"
        args:
          type: object
          description: Arguments to pass to the function
        format:
          type: string
          enum: [json]
          default: json

    ConvexResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, error]
        value:
          description: Return value of the function (on success)
        errorMessage:
          type: string
          description: Error message (on error)
        errorData:
          description: Additional error data (on error)

    # ─── Domain models ───────────────────────────────────────────────────────────
    User:
      type: object
      required: [_id, _creationTime, workosUserId, email, name, role, workspaceId, status]
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        workosUserId:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [admin, member]
        workspaceId:
          type: string
          description: Convex document ID referencing workspaces
        status:
          type: string
          enum: [active, invited, deactivated]
        lastSeenAt:
          type: number
          nullable: true
          description: Unix epoch milliseconds

    Workspace:
      type: object
      required: [_id, _creationTime, name, slug, createdBy]
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        name:
          type: string
        slug:
          type: string
        workosOrgId:
          type: string
          nullable: true
        createdBy:
          type: string
          description: Convex document ID referencing users
        integrations:
          type: object
          nullable: true
          additionalProperties: true

    Channel:
      type: object
      required: [_id, _creationTime, name, workspaceId, createdBy, isDefault, isArchived]
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        name:
          type: string
        description:
          type: string
          nullable: true
        workspaceId:
          type: string
          description: Convex document ID referencing workspaces
        createdBy:
          type: string
          description: Convex document ID referencing users
        isDefault:
          type: boolean
        isArchived:
          type: boolean

    ChannelWithMeta:
      allOf:
        - $ref: "#/components/schemas/Channel"
        - type: object
          properties:
            isMember:
              type: boolean
            unreadCount:
              type: integer

    ChannelMember:
      type: object
      required: [_id, _creationTime, channelId, userId]
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        channelId:
          type: string
          description: Convex document ID referencing channels
        userId:
          type: string
          description: Convex document ID referencing users
        lastReadAt:
          type: number
          nullable: true
          description: Unix epoch milliseconds

    Citation:
      type: object
      required: [text]
      properties:
        text:
          type: string
        sourceUrl:
          type: string
          nullable: true
        sourceTitle:
          type: string
          nullable: true

    Message:
      type: object
      required: [_id, _creationTime, channelId, authorId, body, type, isEdited]
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        channelId:
          type: string
          description: Convex document ID referencing channels
        authorId:
          type: string
          description: Convex document ID referencing users
        body:
          type: string
        type:
          type: string
          enum: [user, bot, system, integration]
        integrationObjectId:
          type: string
          nullable: true
          description: Convex document ID referencing integrationObjects
        citations:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Citation"
        mentions:
          type: array
          nullable: true
          items:
            type: string
        graphitiEpisodeId:
          type: string
          nullable: true
        isEdited:
          type: boolean

    IntegrationObject:
      type: object
      required: [_id, _creationTime, workspaceId, type, externalId, title, status, url, author, metadata, lastSyncedAt]
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        workspaceId:
          type: string
          description: Convex document ID referencing workspaces
        type:
          type: string
          enum: [github_pr, linear_ticket]
        externalId:
          type: string
        title:
          type: string
        status:
          type: string
        url:
          type: string
        author:
          type: string
        metadata:
          type: object
          additionalProperties: true
        lastSyncedAt:
          type: number
          description: Unix epoch milliseconds
        graphitiEpisodeId:
          type: string
          nullable: true

    InboxBullet:
      type: object
      required: [text, priority, relatedMessageIds]
      properties:
        text:
          type: string
        priority:
          type: string
          enum: [high, medium, low]
        relatedMessageIds:
          type: array
          items:
            type: string
            description: Convex document ID referencing messages

    ActionItem:
      type: object
      required: [text]
      properties:
        text:
          type: string
        assignee:
          type: string
          nullable: true
        relatedIntegrationObjectId:
          type: string
          nullable: true
          description: Convex document ID referencing integrationObjects

    InboxSummary:
      type: object
      required: [_id, _creationTime, userId, channelId, bullets, messageCount, periodStart, periodEnd, isRead, isArchived]
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        userId:
          type: string
          description: Convex document ID referencing users
        channelId:
          type: string
          description: Convex document ID referencing channels
        bullets:
          type: array
          items:
            $ref: "#/components/schemas/InboxBullet"
        messageCount:
          type: number
        periodStart:
          type: number
          description: Unix epoch milliseconds
        periodEnd:
          type: number
          description: Unix epoch milliseconds
        isRead:
          type: boolean
        isArchived:
          type: boolean
        actionItems:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ActionItem"

    Draft:
      type: object
      required: [_id, _creationTime, userId, channelId, body, contextSnapshot, suggestedCompletion, status, createdAt, updatedAt]
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        userId:
          type: string
          description: Convex document ID referencing users
        channelId:
          type: string
          description: Convex document ID referencing channels
        body:
          type: string
        replyToMessageId:
          type: string
          nullable: true
          description: Convex document ID referencing messages
        contextSnapshot:
          type: string
        suggestedCompletion:
          type: string
        status:
          type: string
          enum: [active, dismissed, sent]
        createdAt:
          type: number
          description: Unix epoch milliseconds
        updatedAt:
          type: number
          description: Unix epoch milliseconds

    ProactiveAlert:
      type: object
      required: [_id, _creationTime, userId, workspaceId, type, channelId, title, body, suggestedAction, priority, status, expiresAt, createdAt]
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        userId:
          type: string
          description: Convex document ID referencing users
        workspaceId:
          type: string
          description: Convex document ID referencing workspaces
        type:
          type: string
          enum: [unanswered_question, pr_review_nudge, incident_route, blocked_task]
        channelId:
          type: string
          description: Convex document ID referencing channels
        title:
          type: string
        body:
          type: string
        sourceMessageId:
          type: string
          nullable: true
          description: Convex document ID referencing messages
        sourceIntegrationObjectId:
          type: string
          nullable: true
          description: Convex document ID referencing integrationObjects
        suggestedAction:
          type: string
        priority:
          type: string
          enum: [high, medium, low]
        status:
          type: string
          enum: [pending, acted, dismissed, expired]
        expiresAt:
          type: number
          description: Unix epoch milliseconds
        createdAt:
          type: number
          description: Unix epoch milliseconds

    Session:
      type: object
      required: [_id, _creationTime, userId, workosSessionId, expiresAt]
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        userId:
          type: string
          description: Convex document ID referencing users
        workosSessionId:
          type: string
        expiresAt:
          type: number
          description: Unix epoch milliseconds

    WorkOSWebhookBody:
      type: object
      required: [event, data]
      properties:
        event:
          type: string
          description: WorkOS event type
          example: user.created
        data:
          type: object
          description: Event payload (shape depends on event type)

paths:
  # ─── HTTP endpoints (true REST) ─────────────────────────────────────────────
  /webhooks/workos:
    post:
      tags: [Webhooks]
      summary: WorkOS webhook receiver
      description: |
        Receives events from WorkOS (user lifecycle, directory sync, etc.).
        Currently handles: `user.created`, `user.updated`, `dsync.user.created`,
        `dsync.user.deleted`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOSWebhookBody"
            examples:
              userCreated:
                summary: user.created event
                value:
                  event: user.created
                  data:
                    email: alice@example.com
                    first_name: Alice
                    last_name: Smith
                    profile_picture_url: https://cdn.example.com/alice.jpg
      responses:
        "200":
          description: Webhook received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true

  # ─── Users ───────────────────────────────────────────────────────────────────
  /api/query#users:getMe:
    post:
      tags: [Users]
      summary: "users:getMe — Get current authenticated user"
      description: |
        Returns the user record for the authenticated session.
        Returns `null` if not authenticated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "users:getMe"
              args: {}
              format: json
      responses:
        "200":
          description: User or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        oneOf:
                          - $ref: "#/components/schemas/User"
                          - type: "null"

  /api/query#users:getByWorkosId:
    post:
      tags: [Users]
      summary: "users:getByWorkosId — Look up user by WorkOS ID"
      description: Looks up a user by their WorkOS user ID. Returns the user document or null.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "users:getByWorkosId"
              args:
                workosUserId: "user_01H..."
              format: json
      responses:
        "200":
          description: User or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        oneOf:
                          - $ref: "#/components/schemas/User"
                          - type: "null"

  /api/mutation#users:createOrUpdate:
    post:
      tags: [Users]
      summary: "users:createOrUpdate — Upsert a user from WorkOS data"
      description: |
        Creates a new user or updates an existing one, matched by `workosUserId`.
        New users are automatically added to the default workspace and its default channels.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "users:createOrUpdate"
              args:
                workosUserId: "user_01H..."
                email: alice@example.com
                name: Alice Smith
                avatarUrl: https://cdn.example.com/alice.jpg
              format: json
      responses:
        "200":
          description: ID of the created or updated user document
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: User document ID

  # ─── Workspaces ──────────────────────────────────────────────────────────────
  /api/mutation#workspaces:create:
    post:
      tags: [Workspaces]
      summary: "workspaces:create — Create a new workspace"
      description: Requires authentication. Slug must be globally unique.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "workspaces:create"
              args:
                name: Acme Corp
                slug: acme-corp
              format: json
      responses:
        "200":
          description: New workspace document ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Workspace document ID
        "400":
          description: Slug already taken

  /api/query#workspaces:getBySlug:
    post:
      tags: [Workspaces]
      summary: "workspaces:getBySlug — Get workspace by slug"
      description: Looks up a workspace by its unique slug. No authentication required.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "workspaces:getBySlug"
              args:
                slug: acme-corp
              format: json
      responses:
        "200":
          description: Workspace or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        oneOf:
                          - $ref: "#/components/schemas/Workspace"
                          - type: "null"

  # ─── Channels ────────────────────────────────────────────────────────────────
  /api/query#channels:list:
    post:
      tags: [Channels]
      summary: "channels:list — List channels in the authenticated user's workspace"
      description: |
        Returns non-archived channels with membership status and unread count.
        Requires authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "channels:list"
              args: {}
              format: json
      responses:
        "200":
          description: Array of channels with metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: array
                        items:
                          $ref: "#/components/schemas/ChannelWithMeta"

  /api/query#channels:get:
    post:
      tags: [Channels]
      summary: "channels:get — Get a channel by ID"
      description: Returns a single channel document by its Convex ID. Requires authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "channels:get"
              args:
                channelId: "jd7abc123..."
              format: json
      responses:
        "200":
          description: Channel document or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        oneOf:
                          - $ref: "#/components/schemas/Channel"
                          - type: "null"

  /api/mutation#channels:create:
    post:
      tags: [Channels]
      summary: "channels:create — Create a new channel"
      description: |
        Name must be unique within the workspace. Creator is auto-joined.
        Requires authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "channels:create"
              args:
                name: general
                description: General discussion
              format: json
      responses:
        "200":
          description: New channel document ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Channel document ID
        "400":
          description: Channel name already taken

  /api/mutation#channels:join:
    post:
      tags: [Channels]
      summary: "channels:join — Join a channel"
      description: |
        Idempotent — returns existing membership ID if already a member.
        Requires authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "channels:join"
              args:
                channelId: "jd7abc123..."
              format: json
      responses:
        "200":
          description: Channel member document ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: ChannelMember document ID

tags:
  - name: Webhooks
    description: Inbound webhook endpoints (server-to-server, no user auth)
  - name: Users
    description: User management
  - name: Workspaces
    description: Workspace management
  - name: Channels
    description: Channel operations
