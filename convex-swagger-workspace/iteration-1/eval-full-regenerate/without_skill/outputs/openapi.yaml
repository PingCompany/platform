openapi: "3.0.3"
info:
  title: PING Platform -- Convex API
  version: "1.0.0"
  description: |
    Public API for the PING Platform, backed by [Convex](https://convex.dev).

    ## How to call Convex functions

    All **queries** and **mutations** are called as JSON-RPC style HTTP requests:

    | Function type | Method | Path |
    |---|---|---|
    | Query | `POST` | `{CONVEX_URL}/api/query` |
    | Mutation | `POST` | `{CONVEX_URL}/api/mutation` |

    ### Request body shape

    ```json
    {
      "path": "<module>:<function>",
      "args": { ... },
      "format": "json"
    }
    ```

    ### Authentication

    Pass a Bearer JWT token issued by WorkOS in the `Authorization` header:

    ```
    Authorization: Bearer <token>
    ```

    ### Internal functions

    Internal functions (e.g. `seed:seedDefaultData`) are not callable via the
    HTTP API and are omitted from this specification.

servers:
  - url: "{convexUrl}"
    description: Convex deployment URL
    variables:
      convexUrl:
        default: https://your-deployment.convex.cloud
        description: Your Convex deployment URL (NEXT_PUBLIC_CONVEX_URL)

security:
  - BearerAuth: []

tags:
  - name: Webhooks
    description: Inbound webhook endpoints (server-to-server, no user auth)
  - name: Users
    description: User management
  - name: Workspaces
    description: Workspace management
  - name: Channels
    description: Channel and membership operations

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT issued by WorkOS

  schemas:
    # ---- Base Convex request / response ------------------------------------
    ConvexQueryRequest:
      type: object
      required: [path, args, format]
      properties:
        path:
          type: string
          description: "Function reference in the form `module:functionName`"
          example: "users:getMe"
        args:
          type: object
          description: Arguments to pass to the function
        format:
          type: string
          enum: [json]
          default: json

    ConvexMutationRequest:
      type: object
      required: [path, args, format]
      properties:
        path:
          type: string
          description: "Function reference in the form `module:functionName`"
          example: "channels:create"
        args:
          type: object
          description: Arguments to pass to the function
        format:
          type: string
          enum: [json]
          default: json

    ConvexResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, error]
        value:
          description: Return value of the function (on success)
        errorMessage:
          type: string
          description: Error message (on error)
        errorData:
          description: Additional error data (on error)

    # ---- Domain models -----------------------------------------------------
    User:
      type: object
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
          description: Unix epoch milliseconds when the document was created
        workosUserId:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [admin, member]
        workspaceId:
          type: string
          description: ID of the workspace the user belongs to
        status:
          type: string
          enum: [active, invited, deactivated]
        lastSeenAt:
          type: number
          nullable: true
          description: Unix epoch milliseconds

    Workspace:
      type: object
      properties:
        _id:
          type: string
        _creationTime:
          type: number
        name:
          type: string
        slug:
          type: string
        workosOrgId:
          type: string
          nullable: true
        createdBy:
          type: string
          description: User ID of the creator
        integrations:
          type: object
          nullable: true
          description: Free-form integration configuration

    Channel:
      type: object
      properties:
        _id:
          type: string
        _creationTime:
          type: number
        name:
          type: string
        description:
          type: string
          nullable: true
        workspaceId:
          type: string
        createdBy:
          type: string
        isDefault:
          type: boolean
        isArchived:
          type: boolean

    ChannelWithMeta:
      allOf:
        - $ref: "#/components/schemas/Channel"
        - type: object
          properties:
            isMember:
              type: boolean
              description: Whether the authenticated user is a member of this channel
            unreadCount:
              type: integer
              description: Number of unread messages since the user last read

    ChannelMember:
      type: object
      properties:
        _id:
          type: string
        _creationTime:
          type: number
        channelId:
          type: string
        userId:
          type: string
        lastReadAt:
          type: number
          nullable: true
          description: Unix epoch milliseconds

    Message:
      type: object
      properties:
        _id:
          type: string
        _creationTime:
          type: number
        channelId:
          type: string
        authorId:
          type: string
        body:
          type: string
        type:
          type: string
          enum: [user, bot, system, integration]
        integrationObjectId:
          type: string
          nullable: true
          description: ID of the related integration object
        citations:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Citation"
        mentions:
          type: array
          nullable: true
          items:
            type: string
        graphitiEpisodeId:
          type: string
          nullable: true
        isEdited:
          type: boolean

    Citation:
      type: object
      properties:
        text:
          type: string
        sourceUrl:
          type: string
          nullable: true
        sourceTitle:
          type: string
          nullable: true

    IntegrationObject:
      type: object
      properties:
        _id:
          type: string
        _creationTime:
          type: number
        workspaceId:
          type: string
        type:
          type: string
          enum: [github_pr, linear_ticket]
        externalId:
          type: string
        title:
          type: string
        status:
          type: string
        url:
          type: string
        author:
          type: string
        metadata:
          type: object
          description: Free-form metadata
        lastSyncedAt:
          type: number
          description: Unix epoch milliseconds
        graphitiEpisodeId:
          type: string
          nullable: true

    InboxSummary:
      type: object
      properties:
        _id:
          type: string
        _creationTime:
          type: number
        userId:
          type: string
        channelId:
          type: string
        bullets:
          type: array
          items:
            $ref: "#/components/schemas/InboxBullet"
        messageCount:
          type: integer
        periodStart:
          type: number
          description: Unix epoch milliseconds
        periodEnd:
          type: number
          description: Unix epoch milliseconds
        isRead:
          type: boolean
        isArchived:
          type: boolean
        actionItems:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ActionItem"

    InboxBullet:
      type: object
      properties:
        text:
          type: string
        priority:
          type: string
          enum: [high, medium, low]
        relatedMessageIds:
          type: array
          items:
            type: string

    ActionItem:
      type: object
      properties:
        text:
          type: string
        assignee:
          type: string
          nullable: true
        relatedIntegrationObjectId:
          type: string
          nullable: true

    Draft:
      type: object
      properties:
        _id:
          type: string
        _creationTime:
          type: number
        userId:
          type: string
        channelId:
          type: string
        body:
          type: string
        replyToMessageId:
          type: string
          nullable: true
        contextSnapshot:
          type: string
        suggestedCompletion:
          type: string
        status:
          type: string
          enum: [active, dismissed, sent]
        createdAt:
          type: number
          description: Unix epoch milliseconds
        updatedAt:
          type: number
          description: Unix epoch milliseconds

    ProactiveAlert:
      type: object
      properties:
        _id:
          type: string
        _creationTime:
          type: number
        userId:
          type: string
        workspaceId:
          type: string
        type:
          type: string
          enum: [unanswered_question, pr_review_nudge, incident_route, blocked_task]
        channelId:
          type: string
        title:
          type: string
        body:
          type: string
        sourceMessageId:
          type: string
          nullable: true
        sourceIntegrationObjectId:
          type: string
          nullable: true
        suggestedAction:
          type: string
        priority:
          type: string
          enum: [high, medium, low]
        status:
          type: string
          enum: [pending, acted, dismissed, expired]
        expiresAt:
          type: number
          description: Unix epoch milliseconds
        createdAt:
          type: number
          description: Unix epoch milliseconds

    Session:
      type: object
      properties:
        _id:
          type: string
        _creationTime:
          type: number
        userId:
          type: string
        workosSessionId:
          type: string
        expiresAt:
          type: number
          description: Unix epoch milliseconds

    WorkOSWebhookBody:
      type: object
      required: [event, data]
      properties:
        event:
          type: string
          description: WorkOS event type
          example: user.created
        data:
          type: object
          description: Event payload (shape depends on event type)

paths:
  # ===========================================================================
  # HTTP endpoints (true REST)
  # ===========================================================================
  /webhooks/workos:
    post:
      tags: [Webhooks]
      summary: WorkOS webhook receiver
      operationId: webhooksWorkos
      description: |
        Receives events from WorkOS (user lifecycle, directory sync, etc.).
        Currently handles: `user.created`, `user.updated`, `dsync.user.created`,
        `dsync.user.deleted`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOSWebhookBody"
            examples:
              userCreated:
                summary: user.created event
                value:
                  event: user.created
                  data:
                    email: alice@example.com
                    first_name: Alice
                    last_name: Smith
                    profile_picture_url: https://cdn.example.com/alice.jpg
              dsyncUserCreated:
                summary: dsync.user.created event
                value:
                  event: dsync.user.created
                  data: {}
      responses:
        "200":
          description: Webhook received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true

  # ===========================================================================
  # Users
  # ===========================================================================
  /api/query#users:getMe:
    post:
      tags: [Users]
      summary: "users:getMe -- Get current authenticated user"
      operationId: usersGetMe
      description: |
        Returns the user record for the authenticated session.
        Looks up the user by the `subject` claim in the JWT.
        Returns `null` if the caller is not authenticated or the user
        document does not exist yet.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "users:getMe"
              args: {}
              format: json
      responses:
        "200":
          description: User or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        oneOf:
                          - $ref: "#/components/schemas/User"
                          - type: "null"

  /api/query#users:getByWorkosId:
    post:
      tags: [Users]
      summary: "users:getByWorkosId -- Look up user by WorkOS ID"
      operationId: usersGetByWorkosId
      description: |
        Finds a user document whose `workosUserId` matches the given value.
        Returns `null` if no match is found.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "users:getByWorkosId"
              args:
                workosUserId: "user_01H..."
              format: json
      responses:
        "200":
          description: User or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        oneOf:
                          - $ref: "#/components/schemas/User"
                          - type: "null"

  /api/mutation#users:createOrUpdate:
    post:
      tags: [Users]
      summary: "users:createOrUpdate -- Upsert a user from WorkOS data"
      operationId: usersCreateOrUpdate
      description: |
        Creates a new user or updates an existing one, matched by `workosUserId`.

        **On update:** patches `email`, `name`, `avatarUrl`, and `lastSeenAt`.

        **On create:**
        - Assigns the user to the default workspace (slug `"default"`),
          creating that workspace if it does not exist.
        - Sets `role` to `"member"` and `status` to `"active"`.
        - Auto-joins the user to every channel in the default workspace
          that has `isDefault: true`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "users:createOrUpdate"
              args:
                workosUserId: "user_01H..."
                email: alice@example.com
                name: Alice Smith
                avatarUrl: https://cdn.example.com/alice.jpg
              format: json
      responses:
        "200":
          description: ID of the created or updated user document
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: User document ID

  # ===========================================================================
  # Workspaces
  # ===========================================================================
  /api/mutation#workspaces:create:
    post:
      tags: [Workspaces]
      summary: "workspaces:create -- Create a new workspace"
      operationId: workspacesCreate
      description: |
        Creates a new workspace. Requires authentication.
        The `slug` must be globally unique; the mutation throws if the slug
        is already taken. The authenticated user is recorded as `createdBy`.

        **Arguments:**
        - `name` (string, required) -- display name.
        - `slug` (string, required) -- URL-safe unique identifier.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "workspaces:create"
              args:
                name: Acme Corp
                slug: acme-corp
              format: json
      responses:
        "200":
          description: New workspace document ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Workspace document ID
        "400":
          description: Slug already taken

  /api/query#workspaces:getBySlug:
    post:
      tags: [Workspaces]
      summary: "workspaces:getBySlug -- Get workspace by slug"
      operationId: workspacesGetBySlug
      description: |
        Looks up a workspace by its unique `slug` field.
        Returns `null` if no workspace matches.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "workspaces:getBySlug"
              args:
                slug: acme-corp
              format: json
      responses:
        "200":
          description: Workspace or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        oneOf:
                          - $ref: "#/components/schemas/Workspace"
                          - type: "null"

  # ===========================================================================
  # Channels
  # ===========================================================================
  /api/query#channels:list:
    post:
      tags: [Channels]
      summary: "channels:list -- List channels in the authenticated user's workspace"
      operationId: channelsList
      description: |
        Returns all non-archived channels in the authenticated user's workspace.
        Each channel is enriched with:
        - `isMember` -- whether the user has a channelMembers record.
        - `unreadCount` -- number of messages created after the user's `lastReadAt`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "channels:list"
              args: {}
              format: json
      responses:
        "200":
          description: Array of channels with metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: array
                        items:
                          $ref: "#/components/schemas/ChannelWithMeta"

  /api/query#channels:get:
    post:
      tags: [Channels]
      summary: "channels:get -- Get a channel by ID"
      operationId: channelsGet
      description: |
        Fetches a single channel document by its Convex document ID.
        Requires authentication. Returns `null` if the ID does not exist.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "channels:get"
              args:
                channelId: "jd7abc123..."
              format: json
      responses:
        "200":
          description: Channel document or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        oneOf:
                          - $ref: "#/components/schemas/Channel"
                          - type: "null"

  /api/mutation#channels:create:
    post:
      tags: [Channels]
      summary: "channels:create -- Create a new channel"
      operationId: channelsCreate
      description: |
        Creates a new channel in the authenticated user's workspace.
        The channel `name` must be unique within the workspace; the mutation
        throws if a channel with the same name already exists.
        New channels default to `isDefault: false` and `isArchived: false`.
        The creator is automatically joined (a channelMembers record is inserted).

        **Arguments:**
        - `name` (string, required) -- channel name.
        - `description` (string, optional) -- channel description.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "channels:create"
              args:
                name: general
                description: General discussion
              format: json
      responses:
        "200":
          description: New channel document ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Channel document ID
        "400":
          description: Channel name already taken in this workspace

  /api/mutation#channels:join:
    post:
      tags: [Channels]
      summary: "channels:join -- Join a channel"
      operationId: channelsJoin
      description: |
        Adds the authenticated user as a member of the specified channel.
        Idempotent -- if the user is already a member, the existing
        channelMembers document ID is returned without creating a duplicate.

        **Arguments:**
        - `channelId` (ID, required) -- Convex document ID of the channel.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "channels:join"
              args:
                channelId: "jd7abc123..."
              format: json
      responses:
        "200":
          description: ChannelMember document ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: ChannelMember document ID
