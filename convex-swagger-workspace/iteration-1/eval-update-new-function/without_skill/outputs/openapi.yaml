openapi: "3.0.3"
info:
  title: PING Platform – Convex API
  version: "1.0.0"
  description: |
    Public API for the PING Platform, backed by [Convex](https://convex.dev).

    ## How to call Convex functions

    All **queries** and **mutations** are called as JSON-RPC style HTTP requests:

    | Function type | Method | Path |
    |---|---|---|
    | Query | `POST` | `{CONVEX_URL}/api/query` |
    | Mutation | `POST` | `{CONVEX_URL}/api/mutation` |

    ### Request body shape

    ```json
    {
      "path": "<module>:<function>",
      "args": { ... },
      "format": "json"
    }
    ```

    ### Authentication

    Pass a Bearer JWT token issued by WorkOS in the `Authorization` header:

    ```
    Authorization: Bearer <token>
    ```

servers:
  - url: "{convexUrl}"
    description: Convex deployment URL
    variables:
      convexUrl:
        default: https://your-deployment.convex.cloud
        description: Your Convex deployment URL (NEXT_PUBLIC_CONVEX_URL)

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT issued by WorkOS

  schemas:
    # ─── Base Convex request/response ───────────────────────────────────────────
    ConvexQueryRequest:
      type: object
      required: [path, args, format]
      properties:
        path:
          type: string
          description: "Function reference in the form `module:functionName`"
          example: "users:getMe"
        args:
          type: object
          description: Arguments to pass to the function
        format:
          type: string
          enum: [json]
          default: json

    ConvexMutationRequest:
      type: object
      required: [path, args, format]
      properties:
        path:
          type: string
          description: "Function reference in the form `module:functionName`"
          example: "channels:create"
        args:
          type: object
          description: Arguments to pass to the function
        format:
          type: string
          enum: [json]
          default: json

    ConvexResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, error]
        value:
          description: Return value of the function (on success)
        errorMessage:
          type: string
          description: Error message (on error)
        errorData:
          description: Additional error data (on error)

    # ─── Domain models ───────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        workosUserId:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [admin, member]
        workspaceId:
          type: string
          description: ID of the workspace the user belongs to
        status:
          type: string
          enum: [active, invited, deactivated]
        lastSeenAt:
          type: number
          nullable: true
          description: Unix epoch milliseconds

    Workspace:
      type: object
      properties:
        _id:
          type: string
        _creationTime:
          type: number
        name:
          type: string
        slug:
          type: string
        workosOrgId:
          type: string
          nullable: true
        createdBy:
          type: string
          description: User ID of the creator
        integrations:
          type: object
          nullable: true

    Channel:
      type: object
      properties:
        _id:
          type: string
        _creationTime:
          type: number
        name:
          type: string
        description:
          type: string
          nullable: true
        workspaceId:
          type: string
        createdBy:
          type: string
        isDefault:
          type: boolean
        isArchived:
          type: boolean

    ChannelWithMeta:
      allOf:
        - $ref: "#/components/schemas/Channel"
        - type: object
          properties:
            isMember:
              type: boolean
            unreadCount:
              type: integer

    Message:
      type: object
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        channelId:
          type: string
          description: ID of the channel this message belongs to
        authorId:
          type: string
          description: ID of the user who sent the message
        body:
          type: string
          description: Message text content
        type:
          type: string
          enum: [user]
        isEdited:
          type: boolean

    WorkOSWebhookBody:
      type: object
      required: [event, data]
      properties:
        event:
          type: string
          description: WorkOS event type
          example: user.created
        data:
          type: object
          description: Event payload (shape depends on event type)

paths:
  # ─── HTTP endpoints (true REST) ─────────────────────────────────────────────
  /webhooks/workos:
    post:
      tags: [Webhooks]
      summary: WorkOS webhook receiver
      description: |
        Receives events from WorkOS (user lifecycle, directory sync, etc.).
        Currently handles: `user.created`, `user.updated`, `dsync.user.created`,
        `dsync.user.deleted`.
      security: []   # no JWT – webhook uses its own secret (TODO)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOSWebhookBody"
            examples:
              userCreated:
                summary: user.created event
                value:
                  event: user.created
                  data:
                    email: alice@example.com
                    first_name: Alice
                    last_name: Smith
                    profile_picture_url: https://cdn.example.com/alice.jpg
      responses:
        "200":
          description: Webhook received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    example: true

  # ─── Users ───────────────────────────────────────────────────────────────────
  /api/query#users:getMe:
    post:
      tags: [Users]
      summary: "users:getMe — Get current authenticated user"
      description: Returns the user record for the authenticated session. Returns `null` if not authenticated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "users:getMe"
              args: {}
              format: json
      responses:
        "200":
          description: User or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        oneOf:
                          - $ref: "#/components/schemas/User"
                          - type: "null"

  /api/query#users:getByWorkosId:
    post:
      tags: [Users]
      summary: "users:getByWorkosId — Look up user by WorkOS ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "users:getByWorkosId"
              args:
                workosUserId: "user_01H..."
              format: json
      responses:
        "200":
          description: User or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        oneOf:
                          - $ref: "#/components/schemas/User"
                          - type: "null"

  /api/mutation#users:createOrUpdate:
    post:
      tags: [Users]
      summary: "users:createOrUpdate — Upsert a user from WorkOS data"
      description: |
        Creates a new user or updates an existing one, matched by `workosUserId`.
        New users are automatically added to the default workspace and its default channels.
      security: []  # called from server-side / webhooks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "users:createOrUpdate"
              args:
                workosUserId: "user_01H..."
                email: alice@example.com
                name: Alice Smith
                avatarUrl: https://cdn.example.com/alice.jpg
              format: json
      responses:
        "200":
          description: ID of the created/updated user document
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: User document ID

  # ─── Workspaces ──────────────────────────────────────────────────────────────
  /api/mutation#workspaces:create:
    post:
      tags: [Workspaces]
      summary: "workspaces:create — Create a new workspace"
      description: Requires authentication. Slug must be globally unique.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "workspaces:create"
              args:
                name: Acme Corp
                slug: acme-corp
              format: json
      responses:
        "200":
          description: New workspace document ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Workspace document ID
        "400":
          description: Slug already taken

  /api/query#workspaces:getBySlug:
    post:
      tags: [Workspaces]
      summary: "workspaces:getBySlug — Get workspace by slug"
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "workspaces:getBySlug"
              args:
                slug: acme-corp
              format: json
      responses:
        "200":
          description: Workspace or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        oneOf:
                          - $ref: "#/components/schemas/Workspace"
                          - type: "null"

  # ─── Channels ────────────────────────────────────────────────────────────────
  /api/query#channels:list:
    post:
      tags: [Channels]
      summary: "channels:list — List channels in the authenticated user's workspace"
      description: Returns non-archived channels with membership status and unread count.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "channels:list"
              args: {}
              format: json
      responses:
        "200":
          description: Array of channels with metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: array
                        items:
                          $ref: "#/components/schemas/ChannelWithMeta"

  /api/query#channels:get:
    post:
      tags: [Channels]
      summary: "channels:get — Get a channel by ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "channels:get"
              args:
                channelId: "jd7abc123..."
              format: json
      responses:
        "200":
          description: Channel document or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        oneOf:
                          - $ref: "#/components/schemas/Channel"
                          - type: "null"

  /api/mutation#channels:create:
    post:
      tags: [Channels]
      summary: "channels:create — Create a new channel"
      description: Name must be unique within the workspace. Creator is auto-joined.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "channels:create"
              args:
                name: general
                description: General discussion
              format: json
      responses:
        "200":
          description: New channel document ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Channel document ID
        "400":
          description: Channel name already taken

  /api/mutation#channels:join:
    post:
      tags: [Channels]
      summary: "channels:join — Join a channel"
      description: Idempotent — returns existing membership ID if already a member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "channels:join"
              args:
                channelId: "jd7abc123..."
              format: json
      responses:
        "200":
          description: Channel member document ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: ChannelMember document ID

  # ─── Messages ────────────────────────────────────────────────────────────────
  /api/mutation#messages:send:
    post:
      tags: [Messages]
      summary: "messages:send — Send a message to a channel"
      description: |
        Inserts a new user message into the specified channel.
        Requires authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "messages:send"
              args:
                channelId: "jd7abc123..."
                body: "Hello, world!"
              format: json
      responses:
        "200":
          description: ID of the newly created message document
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Message document ID

  /api/query#messages:listByChannel:
    post:
      tags: [Messages]
      summary: "messages:listByChannel — List messages in a channel"
      description: |
        Returns messages for the given channel, ordered newest-first.
        Defaults to 50 messages; use the `limit` argument to override.
        Requires authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "messages:listByChannel"
              args:
                channelId: "jd7abc123..."
                limit: 25
              format: json
      responses:
        "200":
          description: Array of message documents (newest first)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: array
                        items:
                          $ref: "#/components/schemas/Message"

tags:
  - name: Webhooks
    description: Inbound webhook endpoints (server-to-server, no user auth)
  - name: Users
    description: User management
  - name: Workspaces
    description: Workspace management
  - name: Channels
    description: Channel operations
  - name: Messages
    description: Channel messaging
