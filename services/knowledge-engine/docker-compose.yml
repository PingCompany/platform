services:
  neo4j:
    image: neo4j:5.22.0-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-pingdev2024}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "${NEO4J_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  graphiti:
    image: zepai/graphiti:latest
    environment:
      NEO4J_URI: bolt://neo4j:${NEO4J_PORT:-7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-pingdev2024}
      NEO4J_PORT: ${NEO4J_PORT:-7687}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j-data:
