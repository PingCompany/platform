name: Tag Codex on PR Commits

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write

jobs:
  tag-codex:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const eventType = context.payload.action;
            const commitCount = context.payload.pull_request.commits;
            
            let message;
            if (eventType === 'opened') {
              message = `@codex — new PR opened with ${commitCount} commit(s). Please review.`;
            } else {
              message = `@codex — new commit(s) pushed to this PR. Please review.`;
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
